name: Efemeryczny Bastion ECS Fargate

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Akcja do wykonania'
        required: true
        type: choice
        options:
          - START
          - STOP

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  TFSTATE_REGION: ${{ vars.TFSTATE_REGION || 'eu-north-1' }}
  TERRAFORM_VERSION: '1.5.7'
  ECR_REPOSITORY: secure-connect-gateway
  BASTION_NAME: ephemeral-bastion

jobs:
  deploy:
    name: 'Zarządzanie Bastionem'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja AWS credentials przez OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalacja Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Logowanie do Amazon ECR
        if: github.event.inputs.action == 'START'
        id: login-ecr
        timeout-minutes: 5
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Create ECR Repository if not exists
        if: github.event.inputs.action == 'START'
        timeout-minutes: 5
        run: |
          if aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Repository juz istnieje"
          else
            aws ecr create-repository \
              --repository-name ${{ env.ECR_REPOSITORY }} \
              --region ${{ env.AWS_REGION }} \
              --encryption-configuration encryptionType=AES256 \
              --image-scanning-configuration scanOnPush=true
          fi

      - name: Build Docker image
        if: github.event.inputs.action == 'START'
        run: docker build -t bastion .

      - name: Generate random port
        if: github.event.inputs.action == 'START'
        id: params
        run: |
          # Losowy port TCP przy KAZDYM uruchomieniu
          RANDOM_PORT=$(shuf -i 10000-60000 -n 1)
          echo "port=$RANDOM_PORT" >> $GITHUB_OUTPUT
          echo "Port TCP: $RANDOM_PORT"

      - name: Push Docker image do Amazon ECR
        if: github.event.inputs.action == 'START'
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_REPO=$REGISTRY/${{ env.ECR_REPOSITORY }}
          docker tag bastion $IMAGE_REPO:latest
          docker push $IMAGE_REPO:latest
          echo "IMAGE_URI=$IMAGE_REPO:latest" >> $GITHUB_ENV

      - name: Create S3 bucket for Terraform state (if not exists)
        if: github.event.inputs.action == 'START'
        run: |
          BUCKET_NAME="secure-connect-gateway-tfstate"
          REGION="${{ env.TFSTATE_REGION }}"
          aws s3api create-bucket \
            --bucket "$BUCKET_NAME" \
            --region "$REGION" \
            --create-bucket-configuration LocationConstraint="$REGION" 2>/dev/null || true
          aws s3api put-bucket-versioning \
            --bucket "$BUCKET_NAME" \
            --region "$REGION" \
            --versioning-configuration Status=Enabled 2>/dev/null || true

      # ===== TERRAFORM =====
      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="bucket=secure-connect-gateway-tfstate" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ env.TFSTATE_REGION }}" \
            -backend-config="encrypt=true"

      # ===== START FLOW =====
      - name: Import existing resources
        if: github.event.inputs.action == 'START'
        working-directory: ./terraform
        run: |
          ROLE_NAME="${{ env.BASTION_NAME }}-exec-role"
          CLUSTER_NAME="${{ env.BASTION_NAME }}-cluster"
          SERVICE_NAME="${{ env.BASTION_NAME }}-service"

          # Remove old random_id and serveo-related state
          terraform state rm random_id.serveo_suffix 2>/dev/null || true

          terraform import \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="container_image=${{ env.IMAGE_URI }}" \
            -var="bore_port=${{ steps.params.outputs.port }}" \
            aws_iam_role.ecs_task_execution_role \
            "$ROLE_NAME" 2>/dev/null || true

          terraform import \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="container_image=${{ env.IMAGE_URI }}" \
            -var="bore_port=${{ steps.params.outputs.port }}" \
            aws_ecs_cluster.bastion_cluster \
            "$CLUSTER_NAME" 2>/dev/null || true

          terraform import \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="container_image=${{ env.IMAGE_URI }}" \
            -var="bore_port=${{ steps.params.outputs.port }}" \
            aws_ecs_service.bastion_service \
            "${CLUSTER_NAME}/${SERVICE_NAME}" 2>/dev/null || true

          terraform import \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="container_image=${{ env.IMAGE_URI }}" \
            -var="bore_port=${{ steps.params.outputs.port }}" \
            aws_cloudwatch_log_group.bastion_logs \
            "/ecs/${{ env.BASTION_NAME }}" 2>/dev/null || true

      - name: Terraform Apply
        if: github.event.inputs.action == 'START'
        working-directory: ./terraform
        run: |
          terraform plan -out=tfplan \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="container_image=${{ env.IMAGE_URI }}" \
            -var="bore_port=${{ steps.params.outputs.port }}"
          terraform apply tfplan

      - name: Pobranie outputow Terraform
        if: github.event.inputs.action == 'START'
        working-directory: ./terraform
        id: tf
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "task_def_arn=$(terraform output -raw task_definition_arn)" >> $GITHUB_OUTPUT
          echo "log_group=$(terraform output -raw log_group_name)" >> $GITHUB_OUTPUT
          echo "bore_port=$(terraform output -raw bore_port)" >> $GITHUB_OUTPUT
          echo "service_name=$(terraform output -raw service_name)" >> $GITHUB_OUTPUT
          echo "connection_cmd=$(terraform output -raw connection_command)" >> $GITHUB_OUTPUT

      - name: Update ECS Service
        if: github.event.inputs.action == 'START'
        run: |
          aws ecs update-service \
            --cluster "${{ steps.tf.outputs.cluster_name }}" \
            --service "${{ steps.tf.outputs.service_name }}" \
            --task-definition "${{ steps.tf.outputs.task_def_arn }}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}" > /dev/null
          echo "Service update triggered (stop old -> start new, max 1 task)"

      - name: Oczekiwanie na task
        if: github.event.inputs.action == 'START'
        id: wait-task
        run: |
          CLUSTER="${{ steps.tf.outputs.cluster_name }}"
          SERVICE="${{ steps.tf.outputs.service_name }}"

          echo "Oczekiwanie na RUNNING task..."
          for i in $(seq 1 90); do
            TASK_ARN=$(aws ecs list-tasks \
              --cluster "$CLUSTER" --service-name "$SERVICE" \
              --desired-status RUNNING --region ${{ env.AWS_REGION }} \
              --query 'taskArns[0]' --output text 2>/dev/null || echo "None")

            if [ "$TASK_ARN" != "None" ] && [ -n "$TASK_ARN" ]; then
              STATUS=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
                --region ${{ env.AWS_REGION }} --query 'tasks[0].lastStatus' --output text)
              echo "[$i/90] Task status: $STATUS"
              if [ "$STATUS" = "RUNNING" ]; then
                TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')
                echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
                echo "Task RUNNING! Czekanie 20s na tunel bore..."
                sleep 20
                break
              fi
            else
              echo "[$i/90] Czekanie..."
            fi
            sleep 3
          done

          if [ -z "$TASK_ID" ]; then
            echo "ERROR: Task nie uruchomil sie!"
            exit 1
          fi

      - name: Sprawdzenie logow
        if: github.event.inputs.action == 'START'
        run: |
          LOG_GROUP="${{ steps.tf.outputs.log_group }}"
          sleep 5

          STREAM=$(aws logs describe-log-streams \
            --log-group-name "$LOG_GROUP" --order-by LastEventTime \
            --descending --max-items 1 \
            --query 'logStreams[0].logStreamName' --output text 2>/dev/null || echo "None")

          if [ "$STREAM" != "None" ] && [ -n "$STREAM" ]; then
            echo "=== CloudWatch Logs ==="
            aws logs get-log-events \
              --log-group-name "$LOG_GROUP" --log-stream-name "$STREAM" \
              --limit 30 --query 'events[*].message' --output text 2>/dev/null || echo "Brak"
          else
            echo "Brak log stream"
          fi

      - name: Podsumowanie
        if: github.event.inputs.action == 'START' && success()
        env:
          BORE_PORT: ${{ steps.tf.outputs.bore_port }}
          TASK_ID: ${{ steps.wait-task.outputs.task_id }}
        run: |
          echo "## Bastion GOTOWY" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Polaczenie SSH:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "ssh -p ${BORE_PORT} root@bore.pub" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parametr | Wartosc |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Host | bore.pub |" >> $GITHUB_STEP_SUMMARY
          echo "| Port | ${BORE_PORT} |" >> $GITHUB_STEP_SUMMARY
          echo "| User | root |" >> $GITHUB_STEP_SUMMARY
          echo "| Task ID | ${TASK_ID} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Aby zatrzymac: uruchom workflow z akcja STOP" >> $GITHUB_STEP_SUMMARY

      # ===== STOP FLOW =====
      - name: Scale down ECS Service (STOP)
        if: github.event.inputs.action == 'STOP'
        run: |
          aws ecs update-service \
            --cluster "${{ env.BASTION_NAME }}-cluster" \
            --service "${{ env.BASTION_NAME }}-service" \
            --desired-count 0 \
            --region ${{ env.AWS_REGION }} > /dev/null 2>&1 || true
          echo "Service scaled to 0, waiting..."
          sleep 15

      - name: Terraform Destroy (STOP)
        if: github.event.inputs.action == 'STOP'
        working-directory: ./terraform
        run: |
          CLUSTER_NAME="${{ env.BASTION_NAME }}-cluster"
          SERVICE_NAME="${{ env.BASTION_NAME }}-service"

          terraform import \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="container_image=000000000000.dkr.ecr.eu-central-1.amazonaws.com/dummy:latest" \
            -var="bore_port=22222" \
            aws_ecs_service.bastion_service \
            "${CLUSTER_NAME}/${SERVICE_NAME}" 2>/dev/null || true

          terraform destroy -auto-approve \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="container_image=000000000000.dkr.ecr.eu-central-1.amazonaws.com/dummy:latest" \
            -var="bore_port=22222"

      - name: Potwierdzenie (STOP)
        if: github.event.inputs.action == 'STOP'
        run: |
          echo "## Bastion usuniety" >> $GITHUB_STEP_SUMMARY
          echo "Wszystkie zasoby usuniete." >> $GITHUB_STEP_SUMMARY
