name: Efemeryczny Bastion ECS Fargate

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Akcja do wykonania'
        required: true
        type: choice
        options:
          - START
          - STOP
      serveo_subdomain:
        description: 'Opcjonalna subdomena Serveo.net (pozostaw puste dla losowej)'
        required: false
        type: string
        default: ''

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  TERRAFORM_VERSION: '1.5.7'
  ECR_REPOSITORY: secure-connect-gateway

jobs:
  deploy:
    name: 'Zarządzanie Bastionem'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja AWS credentials przez OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalacja Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Logowanie do Amazon ECR
        if: github.event.inputs.action == 'START'
        id: login-ecr
        timeout-minutes: 5
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Create ECR Repository if not exists
        if: github.event.inputs.action == 'START'
        timeout-minutes: 5
        run: |
          echo "Sprawdzanie ECR repository..."
          
          # Check if repo exists
          if aws ecr describe-repositories \
            --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} \
            2>/dev/null; then
            echo "✓ Repository już istnieje"
          else
            echo "Repository nie istnieje - tworzę..."
            aws ecr create-repository \
              --repository-name ${{ env.ECR_REPOSITORY }} \
              --region ${{ env.AWS_REGION }} \
              --encryption-configuration encryptionType=AES256 \
              --image-scanning-configuration scanOnPush=true
            echo "✓ Repository utworzone"
          fi

      - name: Set ECR Lifecycle Policy (keep only latest images)
        if: github.event.inputs.action == 'START'
        timeout-minutes: 2
        run: |
          echo "Ustawianie lifecycle policy..."
          
          cat > /tmp/lifecycle-policy.json << 'EOF'
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only latest 2 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 2
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
          EOF
          
          aws ecr put-lifecycle-policy \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --lifecycle-policy-text file:///tmp/lifecycle-policy.json \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true
          
          echo "✓ Lifecycle policy ustawiona"

      - name: Build Docker image (START)
        if: github.event.inputs.action == 'START'
        run: |
          docker build -t bastion .

      - name: Skanowanie obrazu na podatności (Trivy)
        if: github.event.inputs.action == 'START'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bastion
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Push Docker image do Amazon ECR
        if: github.event.inputs.action == 'START'
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_REPO=$REGISTRY/${{ env.ECR_REPOSITORY }}
          
          # Push z tagiem 'latest' (overwrite zawsze ten sam tag)
          docker tag bastion $IMAGE_REPO:latest
          docker push $IMAGE_REPO:latest
          
          # Opcjonalnie: push z commit SHA dla historii (ale lifecycle policy usunie stare)
          docker tag bastion $IMAGE_REPO:${{ github.sha }}
          docker push $IMAGE_REPO:${{ github.sha }}
          
          echo "IMAGE_URI=$IMAGE_REPO:latest" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Plan & Apply (START)
        if: github.event.inputs.action == 'START'
        working-directory: ./terraform
        run: |
          terraform plan \
            -out=tfplan \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="container_image=${{ env.IMAGE_URI }}" \
            -var="serveo_subdomain=${{ github.event.inputs.serveo_subdomain }}"
          terraform apply tfplan

      - name: Pobranie outputów Terraform
        if: github.event.inputs.action == 'START'
        working-directory: ./terraform
        id: terraform-outputs
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          CLUSTER_ARN=$(terraform output -raw cluster_arn)
          TASK_DEF_ARN=$(terraform output -raw task_definition_arn)
          SUBNET_ID=$(terraform output -raw subnet_id)
          SG_ID=$(terraform output -raw security_group_id)
          LOG_GROUP=$(terraform output -raw log_group_name)
          SERVEO_SUBDOMAIN=$(terraform output -raw serveo_subdomain)
          SERVICE_NAME=$(terraform output -raw service_name)
          
          echo "cluster_name=$CLUSTER_NAME" >> $GITHUB_OUTPUT
          echo "cluster_arn=$CLUSTER_ARN" >> $GITHUB_OUTPUT
          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT
          echo "subnet_id=$SUBNET_ID" >> $GITHUB_OUTPUT
          echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT
          echo "log_group=$LOG_GROUP" >> $GITHUB_OUTPUT
          echo "serveo_subdomain=$SERVEO_SUBDOMAIN" >> $GITHUB_OUTPUT
          echo "service_name=$SERVICE_NAME" >> $GITHUB_OUTPUT

      - name: Trigger ECS Service Redeploy (restart with new image)
        if: github.event.inputs.action == 'START'
        id: run-task
        run: |
          SERVICE_NAME=${{ steps.terraform-outputs.outputs.service_name }}
          CLUSTER_NAME=${{ steps.terraform-outputs.outputs.cluster_name }}
          REGION=${{ env.AWS_REGION }}
          
          echo "Aktualizowanie ECS Service: $SERVICE_NAME"
          echo "Service automatycznie: stop old task → start new task"
          
          # Force service to redeploy (pick new task definition)
          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --force-new-deployment \
            --region "$REGION" > /dev/null
          
          echo "✓ Service redeploy triggered"
          echo "ECS cluster pilnuje aby zawsze był 1 task uruchomiony"

      - name: Oczekiwanie na uruchomienie tasku i pobranie logów
        if: github.event.inputs.action == 'START'
        id: wait-and-logs
        run: |
          CLUSTER_NAME=${{ steps.terraform-outputs.outputs.cluster_name }}
          SERVICE_NAME=${{ steps.terraform-outputs.outputs.service_name }}
          LOG_GROUP=${{ steps.terraform-outputs.outputs.log_group }}
          
          echo "Oczekiwanie na uruchomienie tasku w Service..."
          echo "Service: $SERVICE_NAME"
          echo "ECS pilnuje aby zawsze był dokładnie 1 task RUNNING"
          
          MAX_ATTEMPTS=60
          ATTEMPT=0
          TASK_RUNNING=false
          TASK_ID=""
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            
            # Pobierz running task z SERVICE (zawsze tylko 1 ze względu na desired_count=1)
            TASK_ID=$(aws ecs list-tasks \
              --cluster "$CLUSTER_NAME" \
              --service-name "$SERVICE_NAME" \
              --desired-status RUNNING \
              --region ${{ env.AWS_REGION }} \
              --query 'taskArns[0]' \
              --output text 2>/dev/null || echo "")
            
            if [ -z "$TASK_ID" ] || [ "$TASK_ID" = "None" ]; then
              echo "[$ATTEMPT/$MAX_ATTEMPTS] Czekanie na task..."
              sleep 2
              continue
            fi
            
            TASK_ID=$(echo "$TASK_ID" | awk -F'/' '{print $NF}')
            
            TASK_INFO=$(aws ecs describe-tasks \
              --cluster "$CLUSTER_NAME" \
              --tasks "$TASK_ID" \
              --region ${{ env.AWS_REGION }} \
              --query 'tasks[0]' 2>/dev/null)
            
            STATUS=$(echo "$TASK_INFO" | jq -r '.lastStatus // "UNKNOWN"')
            
            echo "[$ATTEMPT/$MAX_ATTEMPTS] Task: $TASK_ID Status: $STATUS"
            
            if [ "$STATUS" = "RUNNING" ]; then
              echo "✓ Task uruchomiony pomyślnie!"
              TASK_RUNNING=true
              sleep 5
              break
            fi
            
            if [ "$STATUS" = "STOPPED" ] || [ "$STATUS" = "STOPPING" ]; then
              echo "✗ Task się nie uruchomił! Status: $STATUS"
              echo ""
              echo "=== Task Details (błędy) ==="
              echo "$TASK_INFO" | jq '.'
              echo ""
              echo "=== Stop Code ==="
              echo "$TASK_INFO" | jq '.stoppedReason // "Brak informacji"'
              break
            fi
            
            sleep 2
          done
          
          if [ "$TASK_RUNNING" = "false" ]; then
            echo ""
            echo "ERROR: Task nie uruchomił się w ciągu 120 sekund!"
            echo ""
            echo "=== Ostatni task status ==="
            aws ecs describe-tasks \
              --cluster "$CLUSTER_NAME" \
              --tasks "$TASK_ID" \
              --region ${{ env.AWS_REGION }} | jq '.tasks[0] | {lastStatus, stoppedCode, stoppedReason, containerInstanceArn}'
            
            exit 1
          fi
          
          echo ""
          echo "Pobieranie logów z grupy: $LOG_GROUP"
          
          # Czytaj logi dopóki nie pojawi się subdomena (bez fixed timeout)
          ACTUAL_SUBDOMAIN=""
          MAX_WAIT=120  # max 120 sekund na wypadek błędu
          ELAPSED=0
          
          while [ -z "$ACTUAL_SUBDOMAIN" ] && [ $ELAPSED -lt $MAX_WAIT ]; do
            # Znajdź najnowszy log stream
            ACTUAL_LOG_STREAM=$(aws logs describe-log-streams \
              --log-group-name "$LOG_GROUP" \
              --order-by LastEventTime \
              --descending \
              --max-items 1 \
              --query 'logStreams[0].logStreamName' \
              --output text 2>/dev/null || echo "")
            
            if [ -n "$ACTUAL_LOG_STREAM" ] && [ "$ACTUAL_LOG_STREAM" != "None" ]; then
              # Pobierz logi z tego streamu
              LOGS=$(aws logs get-log-events \
                --log-group-name "$LOG_GROUP" \
                --log-stream-name "$ACTUAL_LOG_STREAM" \
                --query 'events[*].[message]' \
                --output text 2>/dev/null)
              
              # Wyciągnij subdomenę jeśli jest
              if [ -n "$LOGS" ]; then
                echo "$LOGS" > /tmp/bastion_logs.txt
                ACTUAL_SUBDOMAIN=$(echo "$LOGS" | grep -oP "Subdomena: \K[^\s]+" | head -1 || echo "")
                
                if [ -n "$ACTUAL_SUBDOMAIN" ]; then
                  echo "✓ Subdomena znaleziona: $ACTUAL_SUBDOMAIN"
                  break
                fi
              fi
            fi
            
            # Czekaj 0.5 sekundy i próbuj jeszcze raz
            sleep 0.5
            ELAPSED=$((ELAPSED + 1))
            echo -n "."  # Progress indicator
          done
          
          echo ""
          echo "=== Logi z CloudWatch ==="
          cat /tmp/bastion_logs.txt 2>/dev/null || echo "Brak logów"
          
          if [ -z "$ACTUAL_SUBDOMAIN" ]; then
            echo "WARNING: Nie znaleziono subdomeny w logach po ${ELAPSED}s, używam z Terraform output"
            ACTUAL_SUBDOMAIN="${{ steps.terraform-outputs.outputs.serveo_subdomain }}"
          fi
          
          echo "actual_subdomain=$ACTUAL_SUBDOMAIN" >> $GITHUB_OUTPUT

      - name: Wyświetlenie podsumowania połączenia
        if: github.event.inputs.action == 'START' && success()
        run: |
          ACTUAL_SUBDOMAIN=${{ steps.wait-and-logs.outputs.actual_subdomain }}
          
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ╔════════════════════════════════════════════════════════╗
          ║               🚀 BASTION GOTOWY!                       ║
          ╚════════════════════════════════════════════════════════╝
          
          **📍 DANE DO POŁĄCZENIA:**
          
          Host: `$ACTUAL_SUBDOMAIN.serveo.net`
          Port: `80`
          User: `root`
          
          **🔗 POLECENIE SSH:**
          
          \`\`\`bash
          ssh -p 80 $ACTUAL_SUBDOMAIN.serveo.net
          \`\`\`
          
          ---
          
          ⏱️ **WAŻNE INFORMACJE:**
          - ✅ Task uruchomiony i stabilny
          - 🔒 Port 80 → Serveo.net → SSH (port 22)
          - ⏰ Bastion będzie aktywny przez 1 godzinę
          - 🛑 Aby zatrzymać: uruchom workflow z akcją STOP
          
          **Troubleshooting:**
          - Timeout? → Check VPC security group (port 443 dla ECR)
          - Connection refused? → Task może się zatrzymać → check CloudWatch logs
          - "Permission denied"? → Check SSH key w kontenerze
          
          ---
          
          EOF

      - name: Wyświetlenie URL Serveo.net w GitHub Summary
        if: github.event.inputs.action == 'START' && false
        run: |
          echo "Step disabled - use new summary above"

      - name: Stop running ECS Task (STOP)
        if: github.event.inputs.action == 'STOP'
        run: |
          # Get running tasks
          TASKS=$(aws ecs list-tasks \
            --cluster ${{ vars.VPC_ID }} \
            --region ${{ env.AWS_REGION }} \
            --query 'taskArns[]' \
            --output text 2>/dev/null || echo "")
          
          if [ -z "$TASKS" ]; then
            echo "No running tasks found"
            exit 0
          fi
          
          # Stop each task
          for TASK_ARN in $TASKS; do
            echo "Stopping task: $TASK_ARN"
            aws ecs stop-task \
              --cluster ${{ vars.VPC_ID }} \
              --task $TASK_ARN \
              --region ${{ env.AWS_REGION }} || true
          done

      - name: Terraform Init (STOP)
        if: github.event.inputs.action == 'STOP'
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Destroy (STOP)
        if: github.event.inputs.action == 'STOP'
        working-directory: ./terraform
        run: |
          terraform destroy \
            -auto-approve \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="container_image=dummy" \
            -var="serveo_subdomain=dummy"

      - name: Potwierdzenie usunięcia (STOP)
        if: github.event.inputs.action == 'STOP'
        run: |
          echo "## ✅ Bastion usunięty" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Wszystkie zasoby zostały bezpiecznie usunięte:" >> $GITHUB_STEP_SUMMARY
          echo "- ECS Task zatrzymany" >> $GITHUB_STEP_SUMMARY
          echo "- Tymczasowa podsieć usunięta" >> $GITHUB_STEP_SUMMARY
          echo "- Security Group usunięta" >> $GITHUB_STEP_SUMMARY
          echo "- ECS Cluster usunięty" >> $GITHUB_STEP_SUMMARY

