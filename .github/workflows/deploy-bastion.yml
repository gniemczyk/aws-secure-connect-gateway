name: Efemeryczny Bastion ECS Fargate

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Akcja do wykonania'
        required: true
        type: choice
        options:
          - START
          - STOP

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  TFSTATE_REGION: ${{ vars.TFSTATE_REGION || 'eu-north-1' }}
  TERRAFORM_VERSION: '1.5.7'
  ECR_REPOSITORY: secure-connect-gateway
  BASTION_NAME: ephemeral-bastion

jobs:
  deploy:
    name: 'Zarządzanie Bastionem'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Login ECR
        if: github.event.inputs.action == 'START'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Create ECR repo
        if: github.event.inputs.action == 'START'
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }} \
            --region ${{ env.AWS_REGION }}

      - name: Build and Push image
        if: github.event.inputs.action == 'START'
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE=$REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE_URI=$IMAGE" >> $GITHUB_ENV

      - name: Create S3 bucket for tfstate
        if: github.event.inputs.action == 'START'
        run: |
          aws s3api create-bucket \
            --bucket secure-connect-gateway-tfstate \
            --region ${{ env.TFSTATE_REGION }} \
            --create-bucket-configuration LocationConstraint=${{ env.TFSTATE_REGION }} 2>/dev/null || true

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="bucket=secure-connect-gateway-tfstate" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=${{ env.TFSTATE_REGION }}" \
            -backend-config="encrypt=true"

      # ===== START =====
      - name: Import existing resources
        if: github.event.inputs.action == 'START'
        working-directory: ./terraform
        run: |
          TF_VARS="-var=vpc_id=${{ vars.VPC_ID }} -var=region=${{ env.AWS_REGION }} -var=container_image=${{ env.IMAGE_URI }}"

          terraform state rm random_id.serveo_suffix 2>/dev/null || true

          terraform import $TF_VARS \
            aws_iam_role.ecs_task_execution_role "${{ env.BASTION_NAME }}-exec-role" 2>/dev/null || true
          terraform import $TF_VARS \
            aws_iam_role_policy_attachment.ecs_exec_policy "${{ env.BASTION_NAME }}-exec-role/arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy" 2>/dev/null || true
          terraform import $TF_VARS \
            aws_iam_role.ecs_task_role "${{ env.BASTION_NAME }}-task-role" 2>/dev/null || true
          terraform import $TF_VARS \
            aws_ecs_cluster.bastion_cluster "${{ env.BASTION_NAME }}-cluster" 2>/dev/null || true
          terraform import $TF_VARS \
            aws_ecs_service.bastion_service "${{ env.BASTION_NAME }}-cluster/${{ env.BASTION_NAME }}-service" 2>/dev/null || true
          terraform import $TF_VARS \
            aws_cloudwatch_log_group.bastion_logs "/ecs/${{ env.BASTION_NAME }}" 2>/dev/null || true

      - name: Terraform Apply
        if: github.event.inputs.action == 'START'
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="container_image=${{ env.IMAGE_URI }}"

      - name: Get outputs
        if: github.event.inputs.action == 'START'
        working-directory: ./terraform
        id: tf
        run: |
          echo "cluster=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "service=$(terraform output -raw service_name)" >> $GITHUB_OUTPUT
          echo "task_def=$(terraform output -raw task_definition_arn)" >> $GITHUB_OUTPUT

      - name: Wait for task
        if: github.event.inputs.action == 'START'
        run: |
          aws ecs update-service \
            --cluster "${{ steps.tf.outputs.cluster }}" \
            --service "${{ steps.tf.outputs.service }}" \
            --task-definition "${{ steps.tf.outputs.task_def }}" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }} > /dev/null

      - name: Wait for task
        if: github.event.inputs.action == 'START'
        id: task
        run: |
          CLUSTER="${{ steps.tf.outputs.cluster }}"
          SERVICE="${{ steps.tf.outputs.service }}"

          echo "Czekanie na stabilny RUNNING task..."
          TASK_ARN=""
          TASK_ID=""

          # Czekanie az deployment sie ustabilizuje (nowy task RUNNING)
          for i in $(seq 1 90); do
            TASK_ARN=$(aws ecs list-tasks --cluster "$CLUSTER" --service-name "$SERVICE" \
              --desired-status RUNNING --region ${{ env.AWS_REGION }} \
              --query 'taskArns[0]' --output text 2>/dev/null)

            if [ "$TASK_ARN" != "None" ] && [ -n "$TASK_ARN" ]; then
              TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')

              # Sprawdz czy ExecuteCommandAgent jest RUNNING
              AGENT_STATUS=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ID" \
                --region ${{ env.AWS_REGION }} \
                --query 'tasks[0].containers[0].managedAgents[?name==`ExecuteCommandAgent`].lastStatus' \
                --output text 2>/dev/null)

              if [ "$AGENT_STATUS" = "RUNNING" ]; then
                echo "Task RUNNING + SSM Agent RUNNING: $TASK_ID"
                echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
                break
              else
                echo "[$i/90] Task ok, SSM Agent: ${AGENT_STATUS:-starting}..."
              fi
            else
              echo "[$i/90] Czekanie na task..."
            fi
            sleep 5
          done

          if [ -z "$TASK_ID" ]; then
            # Fallback - podaj task nawet bez agenta
            if [ "$TASK_ARN" != "None" ] && [ -n "$TASK_ARN" ]; then
              TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')
              echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
              echo "UWAGA: SSM Agent moze potrzebowac jeszcze chwili"
            else
              echo "ERROR: Brak RUNNING task!"
              exit 1
            fi
          fi

      - name: Podsumowanie
        if: github.event.inputs.action == 'START' && success()
        run: |
          CLUSTER="${{ steps.tf.outputs.cluster }}"
          TASK_ID="${{ steps.task.outputs.task_id }}"
          REGION="${{ env.AWS_REGION }}"
          CMD="aws ecs execute-command --cluster ${CLUSTER} --task ${TASK_ID} --interactive --command \"/bin/sh\" --region ${REGION}"

          echo ""
          echo "============================================"
          echo " BASTION GOTOWY - POLACZ SIE KOMENDA:"
          echo "============================================"
          echo ""
          echo "$CMD"
          echo ""
          echo "============================================"
          echo ""

          echo "## BASTION GOTOWY" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$CMD" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      # ===== STOP =====
      - name: Stop service
        if: github.event.inputs.action == 'STOP'
        run: |
          aws ecs update-service \
            --cluster "${{ env.BASTION_NAME }}-cluster" \
            --service "${{ env.BASTION_NAME }}-service" \
            --desired-count 0 \
            --region ${{ env.AWS_REGION }} > /dev/null 2>&1 || true
          sleep 15

      - name: Terraform Destroy
        if: github.event.inputs.action == 'STOP'
        working-directory: ./terraform
        run: |
          terraform import \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="container_image=000000000000.dkr.ecr.eu-central-1.amazonaws.com/x:latest" \
            aws_ecs_service.bastion_service \
            "${{ env.BASTION_NAME }}-cluster/${{ env.BASTION_NAME }}-service" 2>/dev/null || true

          terraform destroy -auto-approve \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var="region=${{ env.AWS_REGION }}" \
            -var="container_image=000000000000.dkr.ecr.eu-central-1.amazonaws.com/x:latest"

      - name: Potwierdzenie (STOP)
        if: github.event.inputs.action == 'STOP'
        run: echo "## Bastion usuniety" >> $GITHUB_STEP_SUMMARY
