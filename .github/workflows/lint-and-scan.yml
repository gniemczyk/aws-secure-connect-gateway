name: Walidacja i Bezpieczenstwo (CI)

on:
  workflow_dispatch: # Mozliwosc recznego uruchomienia z GitHub Actions UI
  push:
    branches: [ main, develop ]

jobs:
  lint-terraform:
    name: Walidacja Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Instalacja Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.7'

      - name: Formatowanie Terraform
        working-directory: ./terraform
        run: terraform fmt -recursive

      - name: Commit sformatowanych plikow
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --staged --quiet || git commit -m "style: auto-format terraform files"
          git push

      - name: Inicjalizacja do walidacji
        working-directory: ./terraform
        run: terraform init -backend=false

      - name: Walidacja skladni
        working-directory: ./terraform
        run: terraform validate

  security-scan:
    name: Skanowanie Bezpieczenstwa (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Skanowanie IaC i plików projektu (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          exit-code: '1' # Przerwij build przy wykryciu krytycznych problemow w IaC
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
