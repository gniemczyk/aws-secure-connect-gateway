name: Walidacja i Bezpieczenstwo (CI)

on:
  workflow_dispatch: # Mozliwosc recznego uruchomienia z GitHub Actions UI
  push:
    branches: [ main, develop ]

jobs:
  lint-terraform:
    name: Walidacja Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Instalacja Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.7'

      - name: Sprawdzenie formatowania Terraform
        working-directory: ./terraform
        run: terraform fmt -check -recursive

      - name: Inicjalizacja do walidacji
        working-directory: ./terraform
        run: terraform init -backend=false

      - name: Walidacja skladni
        working-directory: ./terraform
        run: terraform validate

  security-scan:
    name: Skanowanie Bezpieczenstwa (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Skanowanie IaC i plików projektu (Trivy)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: 'config'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
