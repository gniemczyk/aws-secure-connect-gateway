name: Walidacja i Bezpieczenstwo (CI)

on:
  workflow_dispatch: # Mozliwosc recznego uruchomienia z GitHub Actions UI
  push:
    branches: [ main, develop ]

jobs:
  lint-terraform:
    name: Walidacja Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Instalacja Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.7'

      - name: Sprawdzenie formatowania Terraform
        working-directory: ./terraform
        run: terraform fmt -check -recursive

      - name: Inicjalizacja do walidacji
        working-directory: ./terraform
        run: terraform init -backend=false

      - name: Walidacja skladni
        working-directory: ./terraform
        run: terraform validate

  security-scan:
    name: Skanowanie Bezpieczenstwa (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Instalacja Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Skanowanie IaC i Dockerfile (Trivy)
        run: trivy config --exit-code 1 --severity HIGH,CRITICAL .
